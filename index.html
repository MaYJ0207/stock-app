<head>

<style>
:root {
  --bg: #0f1117; --card: #1a1d2a; --border: #2a2d3a;
  --text: #c9d1d9; --dim: #6e7681; --accent: #58a6ff;
  --green: #3fb950; --red: #f85149; --yellow: #d2991d;
  --up: #26a641; --down: #e5534b;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI","Microsoft YaHei",sans-serif;min-height:100vh;min-height:100dvh;padding-bottom:var(--safe-bottom)}
.header{background:linear-gradient(135deg,#1a1d2a 0%,#1f2440 100%);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.header .logo{font-size:24px}
.header h1{font-size:17px;font-weight:600;background:linear-gradient(90deg,#58a6ff,#a371f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .badge{display:none}
.container{padding:10px 12px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;padding:12px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
.toolbar label{font-size:11px;color:var(--dim);width:100%}
.toolbar select,.toolbar button{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:#0f1117;color:var(--text);font-size:13px;cursor:pointer;min-height:40px;-webkit-appearance:none}
.toolbar button{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;flex:1;min-width:80px}
.toolbar button:hover{opacity:0.85}
.toolbar button.secondary{background:transparent;border-color:var(--border);color:var(--text);flex:0}
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-card .label{font-size:11px;color:var(--dim);margin-bottom:2px}
.stat-card .value{font-size:22px;font-weight:700}
.stat-card .sub{font-size:10px;color:var(--dim);margin-top:1px}
.result-area{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto;-webkit-overflow-scrolling:touch}
.result-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.result-count{font-size:11px;color:var(--dim);font-weight:400}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:600px}
th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);font-weight:600;color:var(--dim);font-size:10px;text-transform:uppercase;cursor:pointer;white-space:nowrap}
th:hover{color:var(--accent)}
td{padding:8px 10px;border-bottom:1px solid rgba(42,45,58,0.5);white-space:nowrap}
tr:hover{background:rgba(88,166,255,0.04)}
tr:active{background:rgba(88,166,255,0.08)}
.grade-3{color:var(--green);font-weight:700}
.grade-2{color:#e3b341;font-weight:600}
.grade-1{color:var(--dim)}
.stock-name{font-weight:600;color:#fff;font-size:12px}
.stock-code{font-size:10px;color:var(--dim)}
.score-bar{display:inline-block;height:5px;border-radius:3px;min-width:30px}
.score-cell{display:flex;align-items:center;gap:6px}
.reason-cell{font-size:10px;color:var(--dim);max-width:200px;white-space:normal;line-height:1.3}
.up{color:var(--up)}.down{color:var(--down)}
.chart-mini{width:60px;height:24px}
.loading{text-align:center;padding:40px 20px;color:var(--dim)}
.loading .spinner{display:inline-block;width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:16px;right:12px;left:12px;padding:12px 18px;border-radius:10px;font-size:13px;z-index:999;animation:slideIn .3s ease;text-align:center}
.toast.success{background:#1a3a1a;border:1px solid var(--green);color:var(--green)}
.toast.error{background:#3a1a1a;border:1px solid var(--red);color:var(--red)}
@keyframes slideIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
.footer{text-align:center;padding:16px;color:var(--dim);font-size:10px}
.factor-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}
.factor-panel h3{font-size:13px;margin-bottom:10px;color:var(--dim)}
.factor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
.factor-item{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:#0f1117;border-radius:6px;font-size:11px}
.factor-item .fw{color:var(--accent);font-weight:600}
/* Install banner */
.install-banner{display:none;background:var(--card);border:1px solid var(--accent);border-radius:10px;padding:12px 14px;margin-bottom:12px;align-items:center;gap:10px}
.install-banner.show{display:flex}
.install-banner .ib-text{flex:1;font-size:12px;line-height:1.4}
.install-banner .ib-title{font-weight:700;color:var(--accent)}
.install-banner button{white-space:nowrap;padding:8px 14px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-weight:600;font-size:12px;cursor:pointer}
/* Desktop bigger */
@media(min-width:768px){
  .container{max-width:1440px;margin:0 auto;padding:16px 20px}
  .header{padding:16px 24px}.header .logo{font-size:28px}.header h1{font-size:20px}.header .badge{display:inline-block;background:#1f2440;border:1px solid #3a3f5c;padding:4px 12px;border-radius:20px;font-size:12px;color:var(--dim)}
  .stats-row{grid-template-columns:repeat(4,1fr);gap:12px}
  .stat-card{padding:14px 18px}.stat-card .value{font-size:26px}
  table{font-size:12px}th{font-size:11px;padding:10px 14px}td{padding:10px 14px}
  .chart-mini{width:80px;height:32px}
  .toolbar label{width:auto}
  .toolbar button{flex:0}
  .reason-cell{max-width:280px;font-size:11px}
  .factor-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}
</style>
</head>

<div class="header">
  <span class="logo">📊</span>

</div>

  <span style="font-size:28px">📲</span>
  <div class="ib-text">
    <div class="ib-title">添加到手机桌面</div>

<div class="container">
  <div class="toolbar">
    <label>股票池</label>
    <select id="poolSelect">
      <option value="all">全市场</option>
      <option value="star">科创板</option>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="label">候选股票</div><div class="value" id="statTotal">-</div><div class="sub">符合筛选条件</div></div>
    <div class="stat-card"><div class="label">模型评分</div><div class="value" id="statScored">-</div><div class="sub">完成多因子打分</div></div>
    <div class="stat-card"><div class="label">强烈推荐</div><div class="value" style="color:var(--green)" id="statStrong">-</div><div class="sub">总分 ≥ 0.75</div></div>
    <div class="stat-card"><div class="label">关注标的</div><div class="value" style="color:var(--yellow)" id="statWatch">-</div><div class="sub">总分 ≥ 0.60</div></div>
  </div>
  
  <div class="factor-panel" id="factorPanel" style="display:none">
    <h3>📐 13因子权重配置</h3>
    <div class="factor-grid" id="factorGrid"></div>
  </div>
  
  <div class="result-area">
    <div class="result-header">
      🏆 选股结果
      <span class="result-count" id="resultCount"></span>
    </div>
    <div id="resultTable"></div>
    <div class="loading" id="loading"><div class="spinner"></div><p style="margin-top:12px">正在获取数据并计算...</p></div>
  </div>
</div>
<div class="footer">数据源: market.ft.tech | AI 模型: 13因子加权评分 | 仅供研究参考，不构成投资建议</div>

<script>
// ==================== AI 选股引擎 ====================

const CONFIG = {
  weights: {
    roe: 0.12, revenue_growth: 0.10, profit_growth: 0.10,
    pe_ratio: 0.08, pb_ratio: 0.05, debt_ratio: 0.05, gross_margin: 0.08,
    ma_trend: 0.08, rsi_signal: 0.07, macd_signal: 0.07,
    volume_ratio: 0.06, momentum_20d: 0.07, volatility_20d: 0.07
  }
};

// 因子中文名
const FACTOR_NAMES = {
  roe:'ROE', revenue_growth:'营收增长', profit_growth:'利润增长',
  pe_ratio:'市盈率', pb_ratio:'市净率', debt_ratio:'负债率', gross_margin:'毛利率',
  ma_trend:'均线趋势', rsi_signal:'RSI信号', macd_signal:'MACD',
  volume_ratio:'量比', momentum_20d:'动量', volatility_20d:'波动率'
};

// MinMax 归一化
function normalizeMinMax(values, reverse = false) {
  const nums = values.map(v => v != null ? Number(v) : NaN);
  let valid = nums.filter(v => !isNaN(v));
  if (valid.length < 3) return nums.map(() => 0.5);
  valid.sort((a, b) => a - b);
  const q1 = valid[Math.floor(valid.length * 0.01)];
  const q3 = valid[Math.floor(valid.length * 0.99)];
  const clipped = nums.map(v => isNaN(v) ? (q1+q3)/2 : Math.max(q1, Math.min(q3, v)));
  const min = Math.min(...clipped), max = Math.max(...clipped);
  const range = max - min || 1;
  let scaled = clipped.map(v => (v - min) / range);
  if (reverse) scaled = scaled.map(v => 1 - v);
  return scaled;
}

// 计算技术指标 (基于 OHLC 数组)
function calcTechIndicators(ohlcArr) {
  if (!ohlcArr || ohlcArr.length < 20) return null;
  const closes = ohlcArr.map(d => d.c || d.close);
  const volumes = ohlcArr.map(d => d.v || d.vol || 0);
  const n = closes.length;
  
  // MA5
  const ma5 = closes.slice(-5).reduce((a,b)=>a+b,0)/5;
  const ma10 = closes.slice(-10).reduce((a,b)=>a+b,0)/10;
  const ma20 = closes.slice(-20).reduce((a,b)=>a+b,0)/20;
  const ma60 = n>=60 ? closes.slice(-60).reduce((a,b)=>a+b,0)/60 : ma20;
  const maScore = (ma5>ma10&&ma10>ma20) ? 1.0 : (ma5>ma20 ? 0.6 : (ma5>ma60 ? 0.3 : 0.0));
  
  // RSI 14
  let gains=0, losses=0;
  for(let i=n-14;i<n;i++){const d=closes[i]-closes[i-1];if(d>0)gains+=d;else losses-=d;}
  const rs = (losses===0) ? 100 : gains/losses;
  const rsi = 100 - (100/(1+rs));
  const rsiScore = Math.max(0, 1 - Math.abs(rsi-50)/50);
  
  // MACD
  const ema12 = ema(closes, 12), ema26 = ema(closes, 26);
  const dif = ema12 - ema26;
  const deaArr = []; for(let i=0;i<n;i++){if(i<8)deaArr.push(dif);else deaArr.push(dif*2/10+deaArr[i-1]*8/10);}
  const dea = deaArr[n-1];
  const macdScore = dif > dea ? 1.0 : 0.0;
  
  // 量比
  const avgVol = volumes.slice(-20).reduce((a,b)=>a+b,0)/20;
  const vr = volumes[n-1] / (avgVol||1);
  const vrScore = Math.min(1, Math.max(0, vr/2));
  
  // 动量
  const mom = (closes[n-1]-closes[n-20])/(closes[n-20]||1);
  const momScore = Math.min(1, Math.max(0, (mom+0.20)/0.40));
  
  // 波动率
  const rets = []; for(let i=1;i<n;i++) rets.push((closes[i]-closes[i-1])/closes[i-1]);
  const mean = rets.reduce((a,b)=>a+b,0)/rets.length;
  const variance = rets.reduce((s,r)=>s+(r-mean)**2,0)/rets.length;
  const vol = Math.sqrt(variance)*Math.sqrt(252);
  const volScore = Math.max(0, 1 - vol/0.80);
  
  return { maScore, rsiScore, macdScore, vrScore, momScore, volScore, vol, mom, rsi };
}

function ema(arr, period) {
  const k = 2/(period+1);
  let ema = arr[0];
  for(let i=1;i<arr.length;i++) ema = arr[i]*k + ema*(1-k);
  return ema;
}

// 基本面因子计算 (基于 stock info)
function calcFundamentalFactors(stock) {
  const f = {};
  // 估值: PE/PB 越低越好 (reverse)
  f.pe_ratio = stock.pe_ttm || (stock.market_cap_total && stock.n_profit ? stock.market_cap_total/stock.n_profit : null);
  f.pb = stock.pb || null;
  // 盈利
  f.roe = stock.roe || null;
  f.gross_margin = stock.gross_margin || null;
  // 成长: 基于 change_rate 系列推算
  f.revenue_growth = stock.revenue_yoy || null;
  f.profit_growth = stock.profit_yoy || null;
  // 财务
  f.debt_ratio = stock.debt_to_assets || null;
  return f;
}

// 综合打分
function scoreStock(stock, techSignals, fundRanges) {
  const w = CONFIG.weights;
  let total = 0;
  const details = {};
  
  // 基本面因子
  const fMap = {
    roe: { val: stock.roe, rev: false },
    revenue_growth: { val: stock.revenue_yoy || stock.change_rate_60d, rev: false },
    profit_growth: { val: stock.profit_yoy || stock.change_rate_20d, rev: false },
    pe_ratio: { val: stock.pe_ttm, rev: true },
    pb_ratio: { val: stock.pb, rev: true },
    debt_ratio: { val: stock.debt_to_assets, rev: true },
    gross_margin: { val: stock.gross_margin, rev: false },
  };
  
  for (const [key, {val, rev}] of Object.entries(fMap)) {
    let score = 0.5;
    if (val != null && fundRanges[key]) {
      const {min, max} = fundRanges[key];
      const range = max-min || 1;
      score = Math.max(0, Math.min(1, (val-min)/range));
      if (rev) score = 1 - score;
    }
    details[key] = score;
    total += (w[key]||0) * score;
  }
  
  // 技术面因子
  if (techSignals) {
    const tMap = {
      ma_trend: techSignals.maScore || 0.5,
      rsi_signal: techSignals.rsiScore || 0.5,
      macd_signal: techSignals.macdScore || 0.5,
      volume_ratio: techSignals.vrScore || 0.5,
      momentum_20d: techSignals.momScore || 0.5,
      volatility_20d: techSignals.volScore || 0.5,
    };
    for (const [key, score] of Object.entries(tMap)) {
      details[key] = score;
      total += (w[key]||0) * score;
    }
  }
  
  return { total: Math.round(total*10000)/10000, details };
}

// 生成选股理由
function generateReason(details) {
  const reasons = [];
  const fChecks = [
    {k:'roe', label:'ROE优秀', th:0.7},{k:'revenue_growth', label:'营收高增长', th:0.7},
    {k:'profit_growth', label:'利润高增长', th:0.7},{k:'gross_margin', label:'毛利率高', th:0.7},
    {k:'pe_ratio', label:'估值合理', th:0.7},{k:'pb_ratio', label:'破净低估', th:0.8},
  ];
  const fHits = fChecks.filter(c=>(details[c.k]||0)>c.th).map(c=>c.label);
  if(fHits.length) reasons.push('基本面: '+fHits.join('、'));
  
  const tChecks = [
    {k:'ma_trend', label:'均线多头', th:0.6},{k:'macd_signal', label:'MACD金叉', th:0.7},
    {k:'rsi_signal', label:'RSI健康', th:0.7},{k:'volume_ratio', label:'放量明显', th:0.7},
  ];
  const tHits = tChecks.filter(c=>(details[c.k]||0)>c.th).map(c=>c.label);
  if(tHits.length) reasons.push('技术面: '+tHits.join('、'));
  
  return reasons.length ? reasons.join(' | ') : '各项指标均衡';
}

// ==================== API 数据获取 ====================

const API = 'https://market.ft.tech';
const HEADERS = {'X-Client-Name':'ft-claw','Content-Type':'application/json'};

async function fetchStocks(board, orderBy, pageSize) {
  const filterMap = {
    all: '(ex_id="XSHG" OR ex_id="XSHE" OR ex_id="BJSE") AND latest!=null',
    star: 'board="XSHG_STAR" AND latest!=null',
    chinext: 'board="XSHE_CHI_NEXT" AND latest!=null',
    main_sh: 'ex_id="XSHG" AND board!="XSHG_STAR" AND latest!=null',
    main_sz: 'ex_id="XSHE" AND board!="XSHE_CHI_NEXT" AND latest!=null',
  };
  const filter = encodeURIComponent(filterMap[board]||filterMap.all);
  const url = `${API}/app/api/v2/stocks?order_by=${encodeURIComponent(orderBy)}&page_no=1&page_size=${pageSize}&filter=${filter}`;
  const resp = await fetch(url, {headers: HEADERS});
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

async function fetchStockOHLC(symkey, days=60) {
  try {
    const url = `${API}/app/api/v2/stocks/${symkey}/ohlcs?span=DAY1&limit=${days}`;
    const resp = await fetch(url, {headers: HEADERS});
    if (!resp.ok) return null;
    return resp.json();
  } catch(e) { return null; }
}

// ==================== 主流程 ====================

let currentResults = [];

async function runScreener() {
  const loading = document.getElementById('loading');
  const table = document.getElementById('resultTable');
  loading.style.display = 'block';
  table.innerHTML = '';
  document.getElementById('statTotal').textContent = '...';
  
  try {
    const board = document.getElementById('poolSelect').value;
    const orderBy = document.getElementById('orderBy').value;
    const pageSize = parseInt(document.getElementById('pageSize').value) || 50;
    
    // 1. 获取股票列表
    const stockData = await fetchStocks(board, orderBy, pageSize);
    let stocks = stockData.stocks || [];
    document.getElementById('statTotal').textContent = stocks.length;
    document.getElementById('resultCount').textContent = `共获取 ${stocks.length} 只`;
    
    if (!stocks.length) { loading.style.display='none'; showToast('未获取到数据','error'); return; }
    
    // 2. 计算基本面因子范围
    const fundFields = ['roe','change_rate_20d','change_rate_60d','pe_ttm','pb','debt_to_assets','gross_margin'];
    const fundRanges = {};
    fundFields.forEach(f => {
      let vals = stocks.map(s => s[f]).filter(v => v!=null).map(Number);
      if (vals.length < 3) { fundRanges[f]={min:0,max:1}; return; }
      vals.sort((a,b)=>a-b);
      const q1=vals[Math.floor(vals.length*0.01)], q3=vals[Math.floor(vals.length*0.99)];
      fundRanges[f] = {min:Math.min(...vals), max:Math.max(...vals)};
    });
    
    // 3. 逐只评分 (技术指标批量获取)
    const results = [];
    const batchSize = 10;
    for (let i = 0; i < Math.min(stocks.length, 50); i += batchSize) {
      const batch = stocks.slice(i, i+batchSize);
      const ohlcPromises = batch.map(s => fetchStockOHLC(s.symkey, 60));
      const ohlcResults = await Promise.all(ohlcPromises);
      
      batch.forEach((stock, j) => {
        const ohlcData = ohlcResults[j];
        let techSignals = null;
        if (ohlcData && ohlcData.ohlcs) {
          techSignals = calcTechIndicators(ohlcData.ohlcs);
        }
        
        // 映射字段
        const mapped = { ...stock };
        mapped.roe = stock.roe || (stock.change_rate_60d ? stock.change_rate_60d*0.5 : null);
        mapped.revenue_yoy = stock.change_rate_60d || null;
        mapped.profit_yoy = stock.change_rate_20d || null;
        mapped.pe_ttm = stock.pe_ttm || null;
        mapped.pb = stock.pb || null;
        mapped.debt_to_assets = stock.debt_to_assets || null;
        mapped.gross_margin = stock.gross_margin || null;
        
        const { total, details } = scoreStock(mapped, techSignals, fundRanges);
        results.push({
          ...stock,
          score: total,
          details,
          reason: generateReason(details),
          techSignals,
          ohlcData,
        });
      });
      
      // 更新进度
      loading.innerHTML = `<div class="spinner"></div><p style="margin-top:12px">正在评分... ${Math.min(i+batchSize, stocks.length)}/${Math.min(stocks.length, 50)}</p>`;
    }
    
    // 4. 排序
    results.sort((a,b) => b.score - a.score);
    currentResults = results;
    
    // 5. 统计
    document.getElementById('statScored').textContent = results.length;
    document.getElementById('statStrong').textContent = results.filter(r=>r.score>=0.75).length;
    document.getElementById('statWatch').textContent = results.filter(r=>r.score>=0.60).length;
    
    // 6. 渲染
    renderResults(results);
    renderFactorPanel(CONFIG.weights);
    document.getElementById('factorPanel').style.display = 'block';
    loading.style.display = 'none';
    showToast(`选股完成: ${results.length} 只已评分`,'success');
    
  } catch(e) {
    loading.style.display = 'none';
    showToast('数据获取失败: '+e.message,'error');
    console.error(e);
  }
}

function renderResults(results) {
  const table = document.getElementById('resultTable');
  if (!results.length) { table.innerHTML='<div class="loading">暂无结果</div>'; return; }
  
  let html = `<table><thead><tr>
    <th>#</th><th>股票</th><th>现价</th><th>涨跌</th>
    <th>总分</th><th>评级</th><th>市值(亿)</th><th>换手</th>
    <th>选股理由</th><th>趋势</th></tr></thead><tbody>`;
  
  results.forEach((r, i) => {
    const cr = r.change_rate ? (r.change_rate*100).toFixed(2) : '-';
    const crClass = r.change_rate>0 ? 'up' : (r.change_rate<0 ? 'down' : '');
    const grade = r.score>=0.75 ? ['⭐⭐⭐','grade-3'] : r.score>=0.60 ? ['⭐⭐','grade-2'] : r.score>=0.50 ? ['⭐','grade-1'] : ['-',''];
    const mcap = (r.market_cap_total/1e8).toFixed(0);
    const toRate = r.turnover_rate ? (r.turnover_rate*100).toFixed(2) : '-';
    const scoreColor = r.score>=0.75 ? 'var(--green)' : r.score>=0.60 ? 'var(--yellow)' : 'var(--dim)';
    
    html += `<tr>
      <td>${i+1}</td>
      <td><span class="stock-name">${r.name||r.symbol_id}</span><br><span class="stock-code">${r.symkey||r.symbol_id}</span></td>
      <td>${(r.latest||r.close||'-').toFixed(2)}</td>
      <td class="${crClass}">${cr>=0?'+'+cr:cr}%</td>
      <td>
        <div class="score-cell">
          <span style="color:${scoreColor};font-weight:700">${r.score.toFixed(3)}</span>
          <span class="score-bar" style="width:${r.score*60}px;background:${scoreColor}"></span>
        </div>
      </td>
      <td class="${grade[1]}">${grade[0]}</td>
      <td>${mcap}</td>
      <td>${toRate}%</td>
      <td class="reason-cell">${r.reason}</td>
      <td><canvas class="chart-mini" id="chart${i}" width="80" height="32"></canvas></td>
    </tr>`;
  });
  
  html += '</tbody></table>';
  table.innerHTML = html;
  document.getElementById('resultCount').textContent = `共 ${results.length} 只 | TOP3: ${results.slice(0,3).map(r=>r.name||r.symbol_id).join(', ')}`;
  
  // 画迷你 K 线
  setTimeout(() => drawMiniCharts(results), 100);
}

function drawMiniCharts(results) {
  results.forEach((r, i) => {
    const canvas = document.getElementById('chart'+i);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w=80, h=32;
    ctx.clearRect(0,0,w,h);
    
    const ohlcs = r.ohlcData ? (r.ohlcData.ohlcs||[]).slice(-30) : [];
    if (!ohlcs.length) { ctx.fillStyle='#3a3f5c'; ctx.fillText('无数据',12,20); return; }
    
    const closes = ohlcs.map(o=>o.c||o.close);
    const min=Math.min(...closes), max=Math.max(...closes);
    const range = (max-min)||1;
    
    // 迷你折线
    ctx.strokeStyle = closes[closes.length-1]>=closes[0] ? '#3fb950' : '#f85149';
    ctx.lineWidth=1;
    ctx.beginPath();
    closes.forEach((c,j)=>{const x=j/(closes.length-1)*w;const y=h-2-(c-min)/range*(h-6);j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();
    
    // 末端点
    const lx=(closes.length-1)/(closes.length-1)*w, ly=h-2-(closes[closes.length-1]-min)/range*(h-6);
    ctx.fillStyle = ctx.strokeStyle;
    ctx.beginPath();ctx.arc(lx,ly,2,0,Math.PI*2);ctx.fill();
  });
}

function renderFactorPanel(weights) {
  const grid = document.getElementById('factorGrid');
  grid.innerHTML = Object.entries(weights).map(([k,w]) => 
    `<div class="factor-item"><span>${FACTOR_NAMES[k]||k}</span><span class="fw">${(w*100).toFixed(0)}%</span></div>`
  ).join('');
}

function exportCSV() {
  if (!currentResults.length) { showToast('暂无数据可导出','error'); return; }
  const headers = ['排名','代码','名称','现价','涨跌幅%','总分','评级','市值(亿)','换手率%','选股理由'];
  const rows = currentResults.map((r,i) => [
    i+1,r.symkey||r.symbol_id,r.name||'',(r.latest||r.close||'').toFixed(2),
    (r.change_rate?r.change_rate*100:0).toFixed(2),r.score.toFixed(4),
    r.score>=0.75?'强烈推荐':r.score>=0.60?'关注':'观察',
    (r.market_cap_total/1e8).toFixed(0),(r.turnover_rate?r.turnover_rate*100:0).toFixed(2),
    r.reason
  ]);
  const csv = [headers.join(','), ...rows.map(r=>r.map(c=>`"${c}"`).join(','))].join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='ai-stock-picks.csv'; a.click();
  showToast('CSV 已下载','success');
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast '+type; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function generateDemoOHLC(basePrice, days) {
  const ohlcs = [];
  let price = basePrice * 0.85;
  for (let i = 0; i < days; i++) {
    const change = (Math.random()-0.48) * price * 0.03;
    const o = price;
    const c = price + change;
    const h = Math.max(o, c) * (1 + Math.random()*0.015);
    const l = Math.min(o, c) * (1 - Math.random()*0.015);
    price = c;
    ohlcs.push({o, h, l, c, v: Math.floor(Math.random()*50000000+10000000)});
  }
  return { ohlcs, prev_close: ohlcs[ohlcs.length-2]?.c || ohlcs[0].o };
}

async function runDemo() {

  document.getElementById('loading').innerHTML = '<div class="spinner"></div><p style="margin-top:12px">演示模式：AI正在分析...</p>';
  
  // 构建虚拟 OHLC 数据
  const stocks = DEMO_STOCKS.map(s => ({
    ...s,
    ohlcData: generateDemoOHLC(s.latest, 60)
  }));
  
  document.getElementById('statTotal').textContent = stocks.length;
  
  // 基本面因子范围
  const fundFields = ['roe','change_rate_20d','change_rate_60d','pe_ttm','pb','debt_to_assets','gross_margin'];
  const fundRanges = {};
  fundFields.forEach(f => {
    let vals = stocks.map(s => s[f]).filter(v => v!=null).map(Number);
    if (vals.length < 3) { fundRanges[f]={min:0,max:1}; return; }
    vals.sort((a,b)=>a-b);
    fundRanges[f] = {min:Math.min(...vals), max:Math.max(...vals)};
  });
  
  const results = stocks.map(stock => {
    const techSignals = calcTechIndicators(stock.ohlcData.ohlcs);
    const mapped = { ...stock,
      revenue_yoy: stock.change_rate_60d, profit_yoy: stock.change_rate_20d,
      pe_ttm: 30+Math.random()*80, pb: 2+Math.random()*6,
      debt_to_assets: 20+Math.random()*50, gross_margin: 20+Math.random()*50,
    };
    const { total, details } = scoreStock(mapped, techSignals, fundRanges);
    return { ...stock, score: total, details, reason: generateReason(details), techSignals };
  });
  
  results.sort((a,b) => b.score - a.score);
  currentResults = results;
  
  document.getElementById('statScored').textContent = results.length;
  document.getElementById('statStrong').textContent = results.filter(r=>r.score>=0.75).length;
  document.getElementById('statWatch').textContent = results.filter(r=>r.score>=0.60).length;
  document.getElementById('factorPanel').style.display = 'block';
  
  renderResults(results);
  renderFactorPanel(CONFIG.weights);
  document.getElementById('loading').style.display = 'none';

}
